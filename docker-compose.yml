version: "3.9"

services:

  web:
    image: nginx:1.27-alpine
    container_name: debatesettler-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./data:/usr/share/nginx/html/data:rw
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  fetcher:
    build:
      context: .
      dockerfile: docker/Dockerfile.fetcher
    container_name: debatesettler-fetcher
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./scripts:/scripts:ro
