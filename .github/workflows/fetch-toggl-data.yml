name: Fetch Toggl Data Daily

on:
  schedule:
    # Run daily at 00:45 UTC
    - cron: '45 0 * * *'
    timezone: "Europe/Zurich"
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push to repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dateutil

    - name: Fetch Toggl data (incremental, last 30 days)
      env:
        TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
        TOGGL_WORKSPACE: DRE-P
      run: |
        python scripts/fetch-toggl-data.py

    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name  "GitHub Action"
        git add data/raw_history.json
        git diff --staged --quiet || git commit -m "Update Toggl data - $(date)"
        git push
